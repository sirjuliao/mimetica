<section style="padding: 40px 0 60px; background:#f3f3f3; min-height:80vh;" class="cid-vmJxZY3wqX" id="witsec-html-block-18">
<div class="container">

  <!-- LEITOR DE POST -->
  <div id="post-viewer" style="display:none; background:#fff; border-radius:16px; padding:40px; box-shadow:0 4px 20px rgba(0,0,0,0.08); margin-bottom:40px;">
    <a onclick="fecharPost()" style="cursor:pointer; font-size:14px; color:#666; margin-bottom:24px; display:inline-block;">← Voltar para o blog</a>
    <div id="post-content"></div>
  </div>

  <!-- LISTA DE POSTS -->
  <div id="blog-lista">

    <!-- BARRA DE CATEGORIAS -->
    <div id="categorias" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:36px;"></div>

    <!-- CARD DESTAQUE -->
    <div id="post-destaque" style="margin-bottom:40px;"></div>

    <!-- GRID DE POSTS -->
    <div id="blog-posts" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:24px;"></div>

  </div>

</div>
<script>
var todosOsPosts = [];
var categoriaAtiva = 'Todos';

function renderPosts(data) {
  todosOsPosts = data.feed.entry || [];
  renderCategories();
  renderGrid(todosOsPosts);
}

function renderCategories() {
  var labels = ['Todos'];
  todosOsPosts.forEach(function(post) {
    if (post.category) {
      post.category.forEach(function(cat) {
        if (labels.indexOf(cat.term) === -1) labels.push(cat.term);
      });
    }
  });

  var container = document.getElementById('categorias');
  container.innerHTML = '';
  labels.forEach(function(label) {
    var btn = document.createElement('button');
    btn.textContent = label;
    btn.id = 'cat-' + label;
    btn.onclick = function() { filtrarPor(label); };
    btn.style.cssText = 'padding:8px 18px; border-radius:20px; border:none; cursor:pointer; font-size:13px; font-weight:600; transition:all 0.2s; ' +
      (label === categoriaAtiva ? 'background:#111; color:#fff;' : 'background:#fff; color:#555; box-shadow:0 1px 4px rgba(0,0,0,0.1);');
    container.appendChild(btn);
  });
}

function filtrarPor(label) {
  categoriaAtiva = label;
  renderCategories();
  var filtrados = label === 'Todos' ? todosOsPosts : todosOsPosts.filter(function(post) {
    return post.category && post.category.some(function(cat) { return cat.term === label; });
  });
  renderGrid(filtrados);
}

function renderGrid(posts) {
  var destaque = document.getElementById('post-destaque');
  var grid = document.getElementById('blog-posts');
  destaque.innerHTML = '';
  grid.innerHTML = '';

  if (posts.length === 0) {
    destaque.innerHTML = '<p style="color:#999;">Nenhum post encontrado.</p>';
    return;
  }

  // Card destaque (primeiro post)
  var p = posts[0];
  var idx = todosOsPosts.indexOf(p);
  var img = p.media$thumbnail ? p.media$thumbnail.url.replace('/s72-c/', '/s800/') : '';
  var label = p.category ? p.category[0].term : '';
  var autor = p.author ? p.author[0].name.$t : '';
  var date = new Date(p.published.$t).toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
  var summary = p.summary ? p.summary.$t : '';

  destaque.innerHTML =
    '<div onclick="abrirPost(' + idx + ')" style="cursor:pointer; display:flex; border-radius:16px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08); background:#fff; min-height:360px;">' +
      (img ? '<div style="flex:0 0 45%;"><img src="' + img + '" style="width:100%; height:100%; object-fit:cover;"></div>' : '') +
      '<div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:space-between;">' +
        '<div>' +
          (label ? '<span style="background:#f0f0f0; padding:4px 14px; border-radius:20px; font-size:12px; font-weight:600;">' + label + '</span>' : '') +
          '<h2 style="font-size:26px; font-weight:700; color:#111; margin:16px 0 12px; line-height:1.3;">' + p.title.$t + '</h2>' +
          '<p style="font-size:15px; color:#555; line-height:1.7;">' + summary + '</p>' +
        '</div>' +
        '<div style="display:flex; align-items:center; gap:12px; border-top:1px solid #f0f0f0; padding-top:20px;">' +
          '<div style="width:36px; height:36px; border-radius:50%; background:#111; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:700; flex-shrink:0;">' + (autor ? autor[0].toUpperCase() : '') + '</div>' +
          '<div>' +
            '<p style="margin:0; font-size:13px; font-weight:600; color:#111;">' + autor + '</p>' +
            '<p style="margin:0; font-size:12px; color:#999;">' + date + '</p>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  // Grid dos demais posts
  posts.slice(1).forEach(function(post) {
    var i = todosOsPosts.indexOf(post);
    var img2 = post.media$thumbnail ? post.media$thumbnail.url.replace('/s72-c/', '/s400-c/') : '';
    var label2 = post.category ? post.category[0].term : '';
    var autor2 = post.author ? post.author[0].name.$t : '';
    var date2 = new Date(post.published.$t).toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
    var summary2 = post.summary ? post.summary.$t.substring(0, 100) + '...' : '';

    grid.innerHTML +=
      '<div onclick="abrirPost(' + i + ')" style="cursor:pointer; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.08); background:#fff; transition:transform 0.2s;" onmouseover="this.style.transform=\'translateY(-4px)\'" onmouseout="this.style.transform=\'none\'">' +
        (img2 ? '<img src="' + img2 + '" style="width:100%; height:180px; object-fit:cover;">' : '') +
        '<div style="padding:20px;">' +
          (label2 ? '<span style="background:#f0f0f0; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600;">' + label2 + '</span>' : '') +
          '<h3 style="font-size:16px; font-weight:700; color:#111; margin:10px 0 8px; line-height:1.3;">' + post.title.$t + '</h3>' +
          '<p style="font-size:13px; color:#666; margin:0 0 16px; line-height:1.5;">' + summary2 + '</p>' +
          '<div style="display:flex; align-items:center; gap:8px;">' +
            '<div style="width:28px; height:28px; border-radius:50%; background:#111; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:700;">' + (autor2 ? autor2[0].toUpperCase() : '') + '</div>' +
            '<div>' +
              '<p style="margin:0; font-size:12px; font-weight:600; color:#111;">' + autor2 + '</p>' +
              '<p style="margin:0; font-size:11px; color:#999;">' + date2 + '</p>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  });

  var params = new URLSearchParams(window.location.search);
  var idx2 = params.get('post');
  if (idx2 !== null) abrirPost(parseInt(idx2));
}

function abrirPost(index) {
  var post = todosOsPosts[index];
  var title = post.title.$t;
  var date = new Date(post.published.$t).toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
  var content = post.content ? post.content.$t : '';
  var img = post.media$thumbnail ? post.media$thumbnail.url.replace('/s72-c/', '/s800/') : '';
  var autor = post.author ? post.author[0].name.$t : '';
  var label = post.category ? post.category[0].term : '';

  document.getElementById('blog-lista').style.display = 'none';
  document.getElementById('post-viewer').style.display = 'block';
  document.getElementById('post-content').innerHTML =
    (img ? '<img src="' + img + '" style="width:100%; max-height:420px; object-fit:cover; border-radius:12px; margin-bottom:30px;">' : '') +
    (label ? '<span style="background:#f0f0f0; padding:4px 14px; border-radius:20px; font-size:12px; font-weight:600;">' + label + '</span>' : '') +
    '<h1 style="font-size:32px; font-weight:700; color:#111; margin:16px 0 12px; line-height:1.3;">' + title + '</h1>' +
    '<div style="display:flex; align-items:center; gap:10px; margin-bottom:30px; padding-bottom:20px; border-bottom:1px solid #f0f0f0;">' +
      '<div style="width:36px; height:36px; border-radius:50%; background:#111; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:700;">' + (autor ? autor[0].toUpperCase() : '') + '</div>' +
      '<div>' +
        '<p style="margin:0; font-size:13px; font-weight:600; color:#111;">' + autor + '</p>' +
        '<p style="margin:0; font-size:12px; color:#999;">' + date + '</p>' +
      '</div>' +
    '</div>' +
    '<div style="font-size:16px; color:#333; line-height:1.8;">' + content + '</div>';

  history.pushState({}, '', 'blog.html?post=' + index);
  window.scrollTo(0, 0);
}

function fecharPost() {
  document.getElementById('post-viewer').style.display = 'none';
  document.getElementById('blog-lista').style.display = 'block';
  history.pushState({}, '', 'blog.html');
  window.scrollTo(0, 0);
}
</script>
<script src="https://mimetize.blogspot.com/feeds/posts/default?alt=json&max-results=20&callback=renderPosts"></script>
</section>
